name: Deploy Slidev to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Slidev deck
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          for deck in \
            0-course-information \
            1-why-geospatial-representation-learning \
            2-geospatial-data-images-maps-time-series \
            3-deep-learning-for-geospatial-prediction \
            4-self-supervised-learning-and-foundation-models \
            5-earth-embeddings-and-location-encoders \
            6-spatiotemporal-representations-and-neural-fields \
            7-geospatial-retrieval-reasoning-and-agents
          do
            test -f "dist/$deck/index.html"
            test -f "dist/$deck/presenter/index.html"
            test -f "dist/$deck/overview/index.html"
            test -f "dist/$deck/slides.pdf"
          done
          ls -la dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
