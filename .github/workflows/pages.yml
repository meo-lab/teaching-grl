name: Deploy Slidev to meo-lab.com

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: teaching-grl-deploy
  cancel-in-progress: false

env:
  SITE_BASE: /teaching/grl/
  TARGET_REPOSITORY: meo-lab/meo-lab.github.io
  TARGET_PATH: teaching/grl

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout course source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Build Slidev deck
        working-directory: source
        run: npm run build

      - name: Verify build output
        working-directory: source
        run: |
          test -f dist/index.html
          for deck in \
            1-why-geospatial-representation-learning \
            2-geospatial-data-images-maps-time-series \
            3-deep-learning-for-geospatial-prediction \
            4-self-supervised-learning-and-foundation-models \
            5-earth-embeddings-and-location-encoders \
            6-spatiotemporal-representations-and-neural-fields \
            7-geospatial-retrieval-reasoning-and-agents
          do
            test -f "dist/$deck/index.html"
            test -f "dist/$deck/presenter/index.html"
            test -f "dist/$deck/overview/index.html"
            test -f "dist/$deck/slides.pdf"
          done
          ls -la dist

      - name: Checkout meo-lab.com site
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPOSITORY }}
          token: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          path: site

      - name: Copy build into meo-lab.com path
        run: |
          rm -rf "site/${TARGET_PATH}"
          mkdir -p "site/${TARGET_PATH}"
          cp -R source/dist/. "site/${TARGET_PATH}/"

      - name: Commit and push site update
        working-directory: site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${TARGET_PATH}"
          if git diff --cached --quiet; then
            echo "No site changes to deploy."
            exit 0
          fi
          git commit -m "Deploy teaching GRL slides"
          git push
